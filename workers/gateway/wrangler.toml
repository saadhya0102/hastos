name = "hastos-gateway"
main = "src/index.ts"
compatibility_date = "2024-10-01"
compatibility_flags = ["nodejs_compat"]

# Public, non-secret vars. Secrets are set via `wrangler secret put` (see README).
[vars]
ALLOW_ANON = "false"            # require a verified Firebase ID token on /slava and /execute
PRIMARY_AI_ENABLED = "true"     # set "false" to force the free fallback model
FIREBASE_PROJECT_ID = "hastos"  # used to validate the token's aud/iss (not a secret)
OPENAI_BASE_URL = "https://api.openai.com/v1"
OPENAI_MODEL = "gpt-4o-mini"
GROQ_BASE_URL = "https://api.groq.com/openai/v1"
GROQ_MODEL = "llama-3.3-70b-versatile"
ALLOWED_ORIGIN = "http://localhost:5173,https://hastos.web.app,https://hastos.firebaseapp.com"
EXEC_BACKEND = "auto"           # "piston" | "judge0" | "auto" (auto prefers Piston if PISTON_URL is set)
ADMIN_EMAILS = "saadhya0102@gmail.com"          # allowlist for admin-only endpoints (/admin/*)
GRADER_IMAGE = "ghcr.io/saadhya0102/hastos-grader:latest"  # image the Admin panel tells hosts to run

# Rate-limit + cache KV (per-user sliding-window counters; see src/lib/ratelimit.ts).
[[kv_namespaces]]
binding = "RATELIMIT"
id = "5921c7a6b09e4fe988b706899d52e733"

# Secrets (do NOT put values here):
#   wrangler secret put OPENAI_API_KEY
#   wrangler secret put GROQ_API_KEY
#   wrangler secret put GRADER_TOKEN           (shared secret self-hosted graders use to register via the Admin panel)
#   wrangler secret put PISTON_URL             (optional static fallback grader; a registered grader overrides it)
#   wrangler secret put JUDGE0_URL             (optional fallback grader)
#   wrangler secret put JUDGE0_AUTH_TOKEN
#   wrangler secret put JUDGE0_RAPIDAPI_HOST   (optional, if using RapidAPI)
#   wrangler secret put FIREBASE_PROJECT_ID
