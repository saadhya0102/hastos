name: Deploy Worker (Cloudflare)

on:
  push:
    branches: [main]
    paths:
      - "workers/gateway/**"
      - "packages/**"
      - ".github/workflows/deploy-worker.yml"
  workflow_dispatch:

jobs:
  deploy:
    # Opt-in: set repository Variable ENABLE_DEPLOY=true (and add CLOUDFLARE_API_TOKEN +
    # CLOUDFLARE_ACCOUNT_ID secrets) to enable auto-deploy. Until then this job is skipped,
    # so it won't fail on missing secrets.
    if: ${{ vars.ENABLE_DEPLOY == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Deploy with Wrangler
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/gateway
          # Sync Worker secrets from GitHub secrets on every deploy. GROQ_API_KEY
          # is the free fallback for SLAVA; JUDGE0_* power code execution.
          secrets: |
            OPENAI_API_KEY
            GROQ_API_KEY
            JUDGE0_URL
            JUDGE0_AUTH_TOKEN
            JUDGE0_RAPIDAPI_HOST
            FIREBASE_PROJECT_ID
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          JUDGE0_URL: ${{ secrets.JUDGE0_URL }}
          JUDGE0_AUTH_TOKEN: ${{ secrets.JUDGE0_AUTH_TOKEN }}
          JUDGE0_RAPIDAPI_HOST: ${{ secrets.JUDGE0_RAPIDAPI_HOST }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
